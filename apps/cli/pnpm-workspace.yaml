# apps/cli é um projeto pnpm ISOLADO — este arquivo faz o pnpm tratar
# apps/cli como raiz própria, sem subir até o pnpm-workspace.yaml do monorepo
# (o backend). Mantém a árvore de deps do CLI separada, como o yarn1 dava.

# node_modules flat (como o yarn1) para deps "phantom" continuarem resolvendo.
nodeLinker: hoisted

# O install em CI roda sem TTY.
confirmModulesPurge: false

# bun: false — dep transitiva (via bun-webgpu); o CLI só detecta bun por
# user-agent, não executa o binário do pacote. Evita baixar ~90MB à toa.
allowBuilds:
  bun: false
