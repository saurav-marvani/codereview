# apps/web é um projeto pnpm ISOLADO — este arquivo faz o pnpm tratar
# apps/web como raiz própria, sem subir até o pnpm-workspace.yaml do monorepo
# (o backend). Assim a árvore de deps do front (Next/React 19) não se mistura
# com a do backend (NestJS) num lockfile único. Espelha a separação que o
# yarn1 dava antes.

# node_modules flat (como o yarn1) para deps "phantom" herdadas continuarem
# resolvendo — mesmo motivo do workspace do backend.
nodeLinker: hoisted

# O entrypoint do container dev roda `pnpm install --frozen-lockfile` sem TTY.
confirmModulesPurge: false

# Portado dos `resolutions` do yarn (segurança/compat). pnpm ignora
# `resolutions`; usa `overrides`.
overrides:
  flatted: ^3.4.2
  prismjs: ^1.30.0
  lodash: ^4.17.23
  js-yaml: ^4.1.1
  axios: ^1.13.5
  qs: '>=6.14.2'
  markdown-it: ^14.1.1
  minimatch: ^10.2.4
  '@eslint/eslintrc>minimatch': ^3.1.3
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  # Security (Dependabot): patch the transitive postcss 8.x line only; the
  # ancient postcss@4 present elsewhere is a different major left untouched.
  'postcss@>=8.0.0 <8.5.19': '8.5.19'

# sharp: build permitido — Next usa para otimização de imagem (next/image).
# unrs-resolver: false — resolver de tooling com binário pré-buildado (napi);
# mesma escolha do workspace do backend.
allowBuilds:
  sharp: true
  unrs-resolver: false

minimumReleaseAgeExclude:
  - '@tiptap/core@3.27.2'
  - '@tiptap/extension-blockquote@3.27.2'
  - '@tiptap/extension-bold@3.27.2'
  - '@tiptap/extension-bubble-menu@3.27.2'
  - '@tiptap/extension-bullet-list@3.27.2'
  - '@tiptap/extension-code-block@3.27.2'
  - '@tiptap/extension-code@3.27.2'
  - '@tiptap/extension-document@3.27.2'
  - '@tiptap/extension-dropcursor@3.27.2'
  - '@tiptap/extension-floating-menu@3.27.2'
  - '@tiptap/extension-gapcursor@3.27.2'
  - '@tiptap/extension-hard-break@3.27.2'
  - '@tiptap/extension-heading@3.27.2'
  - '@tiptap/extension-horizontal-rule@3.27.2'
  - '@tiptap/extension-italic@3.27.2'
  - '@tiptap/extension-link@3.27.2'
  - '@tiptap/extension-list-item@3.27.2'
  - '@tiptap/extension-list-keymap@3.27.2'
  - '@tiptap/extension-list@3.27.2'
  - '@tiptap/extension-ordered-list@3.27.2'
  - '@tiptap/extension-paragraph@3.27.2'
  - '@tiptap/extension-placeholder@3.27.2'
  - '@tiptap/extension-strike@3.27.2'
  - '@tiptap/extension-text@3.27.2'
  - '@tiptap/extension-underline@3.27.2'
  - '@tiptap/extensions@3.27.2'
  - '@tiptap/pm@3.27.2'
  - '@tiptap/react@3.27.2'
  - '@tiptap/starter-kit@3.27.2'
  - '@types/node@26.1.1'
  - posthog-node@5.40.0
