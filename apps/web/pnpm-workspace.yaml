# apps/web é um projeto pnpm ISOLADO — este arquivo faz o pnpm tratar
# apps/web como raiz própria, sem subir até o pnpm-workspace.yaml do monorepo
# (o backend). Assim a árvore de deps do front (Next/React 19) não se mistura
# com a do backend (NestJS) num lockfile único. Espelha a separação que o
# yarn1 dava antes.

# node_modules flat (como o yarn1) para deps "phantom" herdadas continuarem
# resolvendo — mesmo motivo do workspace do backend.
nodeLinker: hoisted

# O entrypoint do container dev roda `pnpm install --frozen-lockfile` sem TTY.
confirmModulesPurge: false

# Portado dos `resolutions` do yarn (segurança/compat). pnpm ignora
# `resolutions`; usa `overrides`.
overrides:
  flatted: ^3.4.2
  prismjs: ^1.30.0
  lodash: ^4.17.23
  js-yaml: ^4.1.1
  axios: ^1.13.5
  qs: '>=6.14.2'
  markdown-it: ^14.1.1
  minimatch: ^10.2.4
  '@eslint/eslintrc>minimatch': ^3.1.3
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3

# sharp: build permitido — Next usa para otimização de imagem (next/image).
# unrs-resolver: false — resolver de tooling com binário pré-buildado (napi);
# mesma escolha do workspace do backend.
allowBuilds:
  sharp: true
  unrs-resolver: false
