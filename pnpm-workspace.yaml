# Flat (yarn-like) node_modules so undeclared "phantom" deps inherited from
# the yarn1 era keep resolving. Was in .npmrc as `node-linker=hoisted`, which
# pnpm 11 no longer reads (only auth/registry stay in .npmrc) — moved here.
nodeLinker: hoisted

# The dev container's entrypoint runs `pnpm install --frozen-lockfile` with no
# TTY; when the node_modules layout must be recreated pnpm otherwise aborts
# (ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY). Allow the purge unattended.
confirmModulesPurge: false

allowBuilds:
  '@datadog/pprof': false
  '@nestjs/core': false
  '@scarf/scarf': false
  '@sentry-internal/node-cpu-profiler': false
  '@sentry/cli': false
  '@sentry/node-cpu-profiler': false
  '@swc/core': false
  '@vscode/ripgrep': false
  esbuild: false
  protobufjs: false
  sharp: false
  unrs-resolver: false

overrides:
  flatted: '^3.4.2'
  moment: '^2.29.4'
  xml2js: '>=0.5.0'
  axios: '>=1.17.0'
  qs: '>=6.15.2'
  diff: '>=8.0.3'
  '@isaacs/brace-expansion': '>=5.0.1'
  'minimatch@>=4 <10.2.1': '^10.2.5'
  rollup: '>=2.80.0'
  tar: '>=7.5.20'
  hono: '>=4.12.25'
  fastify: '>=5.8.5'
  file-type: '>=22.0.1'
  undici: '>=8.5.0'
  yauzl: '>=3.2.1'
  # Security bumps (Dependabot) — keyed by the vulnerable range so only the
  # affected transitive resolution is patched (no cross-major forcing, no
  # downgrade of already-safe copies). Fix versions are each advisory's
  # first_patched_version.
  '@xhmikosr/decompress@<11.1.3': '11.1.3'
  '@grpc/grpc-js@>=1.14.0 <1.14.4': '1.14.4'
  '@babel/core@<=7.29.0': '7.29.6' # 8.x is a major
  # uuid: dedupe the stray transitive uuid@9 up to the version the app
  # already uses directly (14.0.1) instead of the minimum-patched 11.1.1.
  'uuid@<14.0.1': '14.0.1'
  'brace-expansion@>=5.0.0 <5.0.7': '5.0.7'
  'postcss@<8.5.19': '8.5.19'
  'ws@>=8.0.0 <8.21.0': '8.21.0'
  'multer@>=1.0.0 <2.2.0': '2.2.0'
  'form-data@>=4.0.0 <4.0.6': '4.0.6'
  # Transitive deps whose LATEST crosses a major boundary — bumping the major
  # here would break the parent lib that pulls them, so pin to the newest
  # release inside the parent-supported major (the real upgrade is the parent).
  'js-yaml@<3.15.0': '3.15.0' # 4.x/5.x untouched
  'protobufjs@<=7.6.2': '7.6.3' # 8.x is a major
  'piscina@<=4.9.2': '4.9.3' # 5.x is a major
  'fast-uri@<=3.1.1': '3.1.2' # 4.x is a major (fastify dep)
  'langsmith@<0.6.0': '0.6.0' # peer-constrained by @langchain/*

minimumReleaseAgeExclude:
  - e2b@2.30.4 || 2.30.5
  - posthog-node@5.38.2 || 5.38.3 || 5.38.4
  - '@langchain/openai@1.5.2 || 1.5.3'
