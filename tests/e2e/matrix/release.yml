id: release
description: |
    Full release matrix. Run before retagging an RC to the customer-visible
    semver tag. Includes upgrade testing for self-hosted.

scenarios:
    - code-review-basic
    - kody-rules-create-and-apply
    - license-attribution
    - upgrade-n-1-to-n
    # SSO cookie-domain regression. Restricted by appliesTo to a single
    # cell (self-hosted × github × license-paid); spins up its own
    # dedicated droplet (--name sso-e2e) with Caddy + Keycloak on
    # sslip.io. Release-only because LE issuance + droplet boot adds
    # ~7-8 min on first run. Validated end-to-end on 2026-05-19.
    - sso-cookie-domain
    # SSO multi-user flows (admin UI smoke + sign-in CTA + new-user
    # signup via SSO + removed-user rejection). Reuses the
    # `sso-e2e` droplet — runs after sso-cookie-domain so the second
    # cell skips droplet provisioning entirely.
    - sso-multi-user

cells:
    # ---------- self-hosted ----------
    - target: self-hosted
      provider: github
      license: license-paid
    - target: self-hosted
      provider: gitlab
      license: license-paid
    - target: self-hosted
      provider: bitbucket
      license: license-paid
    - target: self-hosted
      provider: azure-devops
      license: license-paid
    - target: self-hosted
      provider: github
      license: license-free

    # ---------- cloud ----------
    - target: cloud
      provider: github
      license: paid
    - target: cloud
      provider: gitlab
      license: paid
    - target: cloud
      provider: bitbucket
      license: paid
    - target: cloud
      provider: azure-devops
      license: paid
    - target: cloud
      provider: github
      license: free
    - target: cloud
      provider: github
      license: trial
