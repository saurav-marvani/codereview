id: full
description: |
    Full tier — strict superset of fast.yml plus the lifecycle scenarios
    (upgrade N-1 → N, SSO cookie-domain + multi-user, Stripe billing).
    Run before retagging an RC to the customer-visible semver tag and
    on a nightly cadence.

    Invariant: every scenario AND cell in fast.yml is also here. If you
    add something to fast.yml, mirror it here too — otherwise we ship
    RCs that passed PR checks but were never exercised in the release
    gate.

# Order matters: onboarding-webhook-registration runs first per cell —
# if the provider's webhook isn't registered after onboarding, every
# downstream scenario times out instead of failing fast.
scenarios:
    # ----- mirrors fast.yml (keep in sync) -----
    - onboarding-webhook-registration
    - code-review-basic
    # @kody review / @kody start-review command path. Disables
    # automatedReviewActive at the org level first, then opens a PR
    # and posts the comment, so the review under test can only come
    # from the command. Covers all 4 providers.
    - command-review
    - kody-rules-create-and-apply
    # Centralized config (config-as-code) init→sync→disable on a throwaway org.
    # github × {paid, license-paid}; skipped unless CENTRALIZED_CONFIG_TEST_REPO is set.
    - centralized-config-sync
    - license-attribution
    # Trial coverage (cloud × github × trial): fresh org per run (14-day
    # window never lapses). entitlement-gate = fast API check;
    # managed-review = throwaway repo + real managed-LLM review (the only
    # cell on Kodus-managed keys). See fast.yml for the full rationale.
    - trial-entitlement-gate
    - trial-credits-consume
    - trial-managed-review
    # Per-seat gate: appliesTo restricts to self-hosted × github × license-paid
    # (one cell). Skipped automatically when SH_LICENSE_KEY_PATH (default
    # ~/.kodus-dev/license-seats1.jwt) isn't available — see run-matrix.ts.
    - per-seat-license-toggle

    # ----- lifecycle scenarios that justify the full tier -----
    - upgrade-n-1-to-n
    # SSO cookie-domain regression. Restricted by appliesTo to a single
    # cell (self-hosted × github × license-paid); spins up its own
    # dedicated droplet (--name sso-e2e) with Caddy + Keycloak on
    # sslip.io. Full-only because LE issuance + droplet boot adds
    # ~7-8 min on first run. Validated end-to-end on 2026-05-19.
    - sso-cookie-domain
    # SSO multi-user flows (admin SSO login + sign-in CTA + new-user
    # signup via SSO + removed-user rejection). Reuses the
    # `sso-e2e` droplet — runs after sso-cookie-domain so the second
    # cell skips droplet provisioning entirely.
    - sso-multi-user
    # Stripe billing lifecycle (Checkout, Portal, downgrade). Cloud-only
    # via dedicated tenants seeded by setup-tenants.ts; test mode so the
    # card 4242 4242 4242 4242 completes synchronously, then we poll the
    # billing API until the webhook lands.
    - stripe-billing
    # RBAC authorization matrix (also in fast.yml). Signs up a throwaway org,
    # provisions one user per role, asserts 200/403 across API endpoints.
    - rbac-authorization
    # RBAC frontend route guard (also in fast.yml): per role, next-auth HTTP
    # sign-in + asserts the middleware /forbidden redirects per the route
    # manifest.
    - rbac-frontend-routes
    # RBAC UI render (real browser, full-only like stripe-billing): drives
    # Chromium per role and asserts the Token Usage menu item + /token-usage
    # screen actually RENDER, and denied roles get a rendered /forbidden page.
    - rbac-ui-render
    # Cockpit analytics availability (real browser): warehouse-up API probe +
    # /cockpit page not gated behind the vestigial WEB_ANALYTICS_SECRET. Runs
    # on cloud (paid/trial) and self-hosted (license-paid) github cells via
    # appliesTo; browser layer self-skips on non-cockpit tiers.
    - cockpit-analytics
    # Public PR-review demo API (also in fast.yml). Anonymous, cloud-only;
    # appliesTo pins it to one cell (cloud × github × paid).
    - public-pr-demo
    # Claude-on-Vertex BYOK on BOTH engines (self-hosted × github only).
    # Full-tier, not fast: needs a GCP service account + a Model-Garden-enabled
    # Claude model (real LLM cost). Each SKIPS (not fails) when its secret is
    # absent, so runners without Vertex wired stay green.
    #   * code-review-vertex-byok: the v5 (Vercel SDK) review path. Needs
    #     VERTEX_SA_JSON (+ optional VERTEX_REGION/VERTEX_MODEL).
    #   * conversation-vertex-byok: the v2 (langchain) path via the kodus-flow
    #     conversation agent — @kody mention. Also needs CONVERSATION_USER_TOKEN
    #     (a non-"kody/kodus" GitHub account with PR R/W on the fixture repo).
    - code-review-vertex-byok
    - conversation-vertex-byok

cells:
    # ---------- self-hosted (mirrors fast.yml) ----------
    - target: self-hosted
      provider: github
      license: license-paid
    - target: self-hosted
      provider: gitlab
      license: license-paid
    - target: self-hosted
      provider: bitbucket
      license: license-paid
    - target: self-hosted
      provider: azure-devops
      license: license-paid
    - target: self-hosted
      provider: github
      license: license-free

    # ---------- cloud (mirrors fast.yml) ----------
    - target: cloud
      provider: github
      license: paid
    - target: cloud
      provider: gitlab
      license: paid
    - target: cloud
      provider: bitbucket
      license: paid
    - target: cloud
      provider: azure-devops
      license: paid
    - target: cloud
      provider: github
      license: free
    - target: cloud
      provider: github
      license: trial
    # Community plan: post-trial tenant that configured its own LLM API
    # key (BYOK). Free in Stripe terms but reviews still work (with the
    # 10-rule limit). Distinct from `free` (= trial expired, no BYOK,
    # gate blocks).
    - target: cloud
      provider: github
      license: community-byok
    # GitHub App (OAuth installation) variant. Same rationale as in
    # fast.yml — covers the authenticateWithCodeOauth code path that
    # the PAT cells don't exercise. Cloud-only.
    - target: cloud
      provider: github-app
      license: paid
