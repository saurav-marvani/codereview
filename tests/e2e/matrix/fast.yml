id: fast
description: |
    Fast tier — the core gates that any release must keep working. Runs
    per PR / on every push to main. Covers webhook auto-registration
    after onboarding, code-review across the 4 providers in both
    targets, license attribution gates, kody-rules create + apply, and
    per-seat license toggling.

    Lifecycle scenarios (upgrade N-1 → N, SSO cookie-domain + multi-user,
    Stripe billing) live in `full.yml`, which is a strict superset of
    this file — anything added here MUST also be in full.yml.

# Order matters: onboarding-webhook-registration runs first per cell. If
# the provider's webhook isn't registered after onboarding, the rest of
# the scenarios are guaranteed to fail (events never reach Kodus) and
# would just waste pipeline budget. Keeping it first surfaces the real
# regression in ~30s instead of as a downstream 10-min timeout.
scenarios:
    - onboarding-webhook-registration
    - code-review-basic
    # @kody review / @kody start-review command path. Disables
    # automatedReviewActive at the org level first, then opens a PR
    # and posts the comment, so the review under test can only come
    # from the command. Covers all 4 providers.
    - command-review
    - kody-rules-create-and-apply
    # Centralized config (config-as-code) init→sync→disable. Signs up its own
    # throwaway org (enabling centralized config makes a tenant's review config
    # read-only, so it must not touch the shared review tenants). Pinned to
    # github × {paid, license-paid} = one cell per target. SKIPPED unless
    # CENTRALIZED_CONFIG_TEST_REPO points at a seeded source repo.
    - centralized-config-sync
    - license-attribution
    # Trial coverage (cloud × github × trial, one cell each). Both sign up a
    # FRESH org per run so the 14-day trial window never lapses — the standing
    # trial tenant expired every ~2 weeks and broke the old `trial` cells on
    # the review scenarios.
    #   * trial-entitlement-gate: API-level, fails in seconds with a precise
    #     billing-level message (validate-org-license = valid + 'trial').
    #   * trial-credits-consume: API-level credit accounting — consume
    #     decrements, repeated usageKey is idempotent, exhaustion blocks. Fast,
    #     no LLM; localizes credit/idempotency bugs in the gate↔billing path.
    #   * trial-managed-review: the REAL thing — throwaway repo (exclusive
    #     webhook route) + PR + managed-LLM review. The only cell exercising
    #     Kodus-managed keys; every other review cell is BYOK.
    - trial-entitlement-gate
    - trial-credits-consume
    - trial-managed-review
    # Per-seat gate: appliesTo restricts to self-hosted × github × license-paid
    # (one cell). Skipped automatically when SH_LICENSE_KEY_PATH (default
    # ~/.kodus-dev/license-seats1.jwt) isn't available — see run-matrix.ts.
    - per-seat-license-toggle
    # RBAC authorization matrix: signs up its own throwaway org, provisions one
    # user per role, and asserts the expected 200/403 across API endpoints.
    # appliesTo restricts it to github × paid (one cell per target).
    - rbac-authorization
    # RBAC frontend route guard: per role, signs in over HTTP (next-auth) and
    # asserts the Next middleware redirects to /forbidden per the route
    # manifest — the layer the #1229 bug lived in. HTTP-only, so fast.
    - rbac-frontend-routes
    # Public PR-review demo API (anonymous, cloud-only). appliesTo pins it
    # to cloud × github × paid so it runs exactly once: featured-grid
    # snapshots + a live enqueue→poll→completed against a small public PR.
    # No tenant/provider — it only touches /cli/public/*.
    - public-pr-demo

cells:
    # ---------- self-hosted ----------
    - target: self-hosted
      provider: github
      license: license-paid
    - target: self-hosted
      provider: gitlab
      license: license-paid
    - target: self-hosted
      provider: bitbucket
      license: license-paid
    - target: self-hosted
      provider: azure-devops
      license: license-paid
    - target: self-hosted
      provider: github
      license: license-free

    # ---------- cloud ----------
    - target: cloud
      provider: github
      license: paid
    - target: cloud
      provider: gitlab
      license: paid
    - target: cloud
      provider: bitbucket
      license: paid
    - target: cloud
      provider: azure-devops
      license: paid
    - target: cloud
      provider: github
      license: free
    - target: cloud
      provider: github
      license: trial
    # Community plan: post-trial tenant that configured its own LLM API
    # key (BYOK). Free in Stripe terms but reviews still work (with the
    # 10-rule limit). Distinct from `free` (= trial expired, no BYOK,
    # gate blocks).
    - target: cloud
      provider: github
      license: community-byok
    # GitHub App (OAuth installation) variant. Covers the
    # authenticateWithCodeOauth code path in github.service.ts which
    # `github` (PAT) doesn't touch. Cloud-only because each self-hosted
    # droplet would need its own App registered + installed (webhook
    # URL is per-app, not per-install). Uses kodus-ai-qa App installed
    # scope-limited to kodus-e2e/tiny-url-app — set
    # GH_APP_TEST_REPO and GH_APP_INSTALLATION_ID in the env to enable;
    # the cell is SKIPPED otherwise via --skip-missing-tokens.
    - target: cloud
      provider: github-app
      license: paid
