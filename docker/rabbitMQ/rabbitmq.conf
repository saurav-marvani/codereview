## Segurança básica
loopback_users.guest = false

## Listeners
listeners.tcp.default = 5672

## Management UI
management.tcp.ip   = 0.0.0.0
management.tcp.port = 15672

## Prometheus (métricas nativas)
prometheus.tcp.ip   = 0.0.0.0
prometheus.tcp.port = 15692

## Limites (tuneáveis por ambiente)
channel_max                        = 2048
vm_memory_high_watermark.relative  = 0.40
disk_free_limit.relative           = 1.20
cluster_partition_handling         = pause_minority

## Consumer ack timeout — code-review jobs hold the message unacked for the
## whole pipeline. The default (30min) is shorter than a long review: a big PR,
## and especially a Kody Runtime run (ephemeral VM boot + playbook + agent),
## routinely exceeds it, so the broker would close the channel and requeue the
## job into a poison loop. job-processor-router.service.ts already assumes a 2h
## broker timeout (its process timeout is 1h45min); set it here so that holds.
consumer_timeout                   = 7200000
