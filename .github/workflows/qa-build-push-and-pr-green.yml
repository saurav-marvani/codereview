name: "Backend: QA GitOps Deploy"

# Scope: backend services only (api/webhooks/worker). Web has dedicated workflows.

on:
    push:
        branches: [ main ]
        paths:
            - "apps/api/**"
            - "apps/worker/**"
            - "apps/webhooks/**"
            - "libs/**"
            - "packages/**"
            - "scripts/gitops/**"
            - "docker/Dockerfile"
            - "docker-bake.hcl"
            - "package.json"
            - "pnpm-lock.yaml"
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Image tag for ECR (default: github.sha)"
                required: false

concurrency:
    group: qa-gitops
    cancel-in-progress: true

permissions:
    contents: write

env:
    AWS_REGION: ${{ secrets.AWS_REGION }}
    IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
    BUILDX_PLATFORMS: linux/arm64
    BUILDX_CACHE_SCOPE: kodus-ai-arm64
    # The runner is linux/amd64 but our images are pushed arm64-only.
    # Without this, Trivy tries to resolve a child manifest for its own
    # platform inside the manifest list and fails with "no child with
    # platform linux/amd64". Trivy CLI picks up `TRIVY_PLATFORM` env to
    # mean `--platform`, so all three scan steps inherit it.
    TRIVY_PLATFORM: linux/arm64

    # ECR repositories (required)
    ECR_REPOSITORY_API: ${{ vars.ECR_REPOSITORY_API }}
    ECR_REPOSITORY_WEBHOOKS: ${{ vars.ECR_REPOSITORY_WEBHOOKS }}
    ECR_REPOSITORY_WORKER: ${{ vars.ECR_REPOSITORY_WORKER }}

    # GitOps (required)
    INFRA_REPO: ${{ vars.INFRA_REPO }}
    INFRA_BASE_BRANCH: ${{ vars.INFRA_BASE_BRANCH }}
    INFRA_TFVARS_PATH: ${{ vars.INFRA_TFVARS_PATH }}

jobs:
    build_push_and_open_pr:
        name: Build/push backend images and open infra PR
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        environment: qa
        permissions:
            contents: write
            id-token: write
            # Required by github/codeql-action/upload-sarif to publish
            # Trivy findings to the repo's Security tab.
            security-events: write
            # Push the buildx layer cache to GHCR (images still go to ECR).
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v6.0.2

            - name: Validate required secrets
              run: |
                  set -euo pipefail
                  if [ -z "${{ vars.INFRA_GITHUB_APP_ID }}" ]; then echo "Missing variable: INFRA_GITHUB_APP_ID"; exit 1; fi
                  for v in ECR_REPOSITORY_API ECR_REPOSITORY_WEBHOOKS ECR_REPOSITORY_WORKER INFRA_REPO INFRA_BASE_BRANCH INFRA_TFVARS_PATH; do
                    if [ -z "${!v:-}" ]; then echo "Missing required variable: $v"; exit 1; fi
                  done
                  if [ -z "${{ secrets.INFRA_GITHUB_APP_PRIVATE_KEY }}" ]; then echo "Missing secret: INFRA_GITHUB_APP_PRIVATE_KEY"; exit 1; fi
                  if [ -z "${{ secrets.AWS_REGION }}" ]; then echo "Missing secret: AWS_REGION"; exit 1; fi
                  if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then echo "Missing secret: AWS_ROLE_TO_ASSUME (OIDC is required)"; exit 1; fi

            - name: Parse infra repo
              run: |
                  set -euo pipefail
                  repo="${{ env.INFRA_REPO }}"
                  if [[ "$repo" == */* ]]; then
                    owner="${repo%%/*}"
                    name="${repo#*/}"
                  else
                    owner="${{ github.repository_owner }}"
                    name="$repo"
                  fi
                  echo "INFRA_REPO_OWNER=$owner" >> "$GITHUB_ENV"
                  echo "INFRA_REPO_NAME=$name" >> "$GITHUB_ENV"

            - name: Get infra repo token (GitHub App)
              id: infra_token
              uses: actions/create-github-app-token@v1.11.0
              with:
                  app-id: ${{ vars.INFRA_GITHUB_APP_ID }}
                  private-key: ${{ secrets.INFRA_GITHUB_APP_PRIVATE_KEY }}
                  owner: ${{ env.INFRA_REPO_OWNER }}
                  repositories: ${{ env.INFRA_REPO_NAME }}

            - name: Configure AWS Credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2.1.4

            - name: Mask ECR registry
              run: echo "::add-mask::${{ steps.login-ecr.outputs.registry }}"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4.0.0
              with:
                  platforms: arm64

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4.0.0

            # Cache push/pull target. Images go to ECR; the buildx layer
            # cache lives in GHCR (durable, no 10GB GHA eviction).
            - name: Login to GitHub Container Registry (build cache)
              uses: docker/login-action@v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build, tag, and push (api/webhooks/worker)
              env:
                  # Authenticates @vscode/ripgrep's postinstall download via
                  # the bake-level `github_token` secret (anonymous GitHub
                  # API calls from runner IPs are rate-limited → 403).
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Durable registry build cache in GHCR (read by bake's
                  # CACHE_TYPE/CACHE_REF — see docker-bake.hcl). arm64-only tag.
                  CACHE_TYPE: registry
                  CACHE_REF: ghcr.io/${{ github.repository_owner }}/kodus-ai-buildcache:qa-arm64
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  API_TAGS: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API
                      }}:${{ env.IMAGE_TAG }}
                  WEBHOOKS_TAGS: ${{ steps.login-ecr.outputs.registry }}/${{
                      env.ECR_REPOSITORY_WEBHOOKS }}:${{ env.IMAGE_TAG }}
                  WORKER_TAGS: ${{ steps.login-ecr.outputs.registry }}/${{
                      env.ECR_REPOSITORY_WORKER }}:${{ env.IMAGE_TAG }}
              run: |
                  set -euo pipefail

                  docker buildx bake -f docker-bake.hcl \
                    --set base.args.RELEASE_VERSION=${{ env.IMAGE_TAG }} \
                    --set base.args.API_CLOUD_MODE=true \
                    --set *.platform=${{ env.BUILDX_PLATFORMS }} \
                    --push \
                    api webhooks worker

                  docker buildx imagetools create \
                    -t "$ECR_REGISTRY/${{ env.ECR_REPOSITORY_API }}:qa-latest" \
                    "$API_TAGS"

                  docker buildx imagetools create \
                    -t "$ECR_REGISTRY/${{ env.ECR_REPOSITORY_WEBHOOKS }}:qa-latest" \
                    "$WEBHOOKS_TAGS"

                  docker buildx imagetools create \
                    -t "$ECR_REGISTRY/${{ env.ECR_REPOSITORY_WORKER }}:qa-latest" \
                    "$WORKER_TAGS"

            # ---- CVE scan -----------------------------------------------------
            # See selfhosted-build-push.yml for flag rationale. Advisory-only
            # (`exit-code: 0`) until backlog triage — flip to `1` to block.
            - name: Trivy scan — kodus-ai-api
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API
                      }}:${{ env.IMAGE_TAG }}
                  format: "sarif"
                  output: "trivy-api.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-ai-webhooks
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ steps.login-ecr.outputs.registry }}/${{
                      env.ECR_REPOSITORY_WEBHOOKS }}:${{ env.IMAGE_TAG }}
                  format: "sarif"
                  output: "trivy-webhooks.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-ai-worker
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_WORKER
                      }}:${{ env.IMAGE_TAG }}
                  format: "sarif"
                  output: "trivy-worker.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            # CodeQL Action v4 rejects multiple SARIF runs sharing a
            # category — one upload step per image with its own category.
            - name: Upload Trivy SARIF — api
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-api.sarif
                  category: trivy-qa-api

            - name: Upload Trivy SARIF — webhooks
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-webhooks.sarif
                  category: trivy-qa-webhooks

            - name: Upload Trivy SARIF — worker
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-worker.sarif
                  category: trivy-qa-worker

            - name: Checkout infra repo
              uses: actions/checkout@v6.0.2
              with:
                  repository: ${{ env.INFRA_REPO }}
                  ref: ${{ env.INFRA_BASE_BRANCH }}
                  token: ${{ steps.infra_token.outputs.token }}
                  path: infra

            - name: Update tfvars (Deploy new images)
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
              run: |
                  set -euo pipefail
                  FILE="infra/${{ env.INFRA_TFVARS_PATH }}"
                  API_IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY_API }}:${{ env.IMAGE_TAG }}"
                  WEBHOOKS_IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY_WEBHOOKS }}:${{ env.IMAGE_TAG }}"
                  WORKER_IMAGE="$ECR_REGISTRY/${{ env.ECR_REPOSITORY_WORKER }}:${{ env.IMAGE_TAG }}"

                  ./scripts/gitops/update-tfvars-deploy.sh "$FILE" "$API_IMAGE" "$WEBHOOKS_IMAGE" "$WORKER_IMAGE"

            - name: Verify infra changes scope
              run: |
                  set -euo pipefail
                  cd infra
                  changed="$(git diff --name-only)"
                  if [ "$(echo "$changed" | wc -l | tr -d ' ')" -ne 1 ]; then
                    echo "Expected exactly 1 changed file in infra repo."; exit 1; fi
                  if [ "$changed" != "${{ env.INFRA_TFVARS_PATH }}" ]; then
                    echo "Unexpected changed file: $changed"; exit 1; fi

            - name: Create PR on infra (QA Deploy)
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ steps.infra_token.outputs.token }}
                  path: infra
                  branch: ci/qa-${{ env.IMAGE_TAG }}
                  base: ${{ env.INFRA_BASE_BRANCH }}
                  title: "QA: deploy (${{ env.IMAGE_TAG }})"
                  labels: auto-apply
                  commit-message: "qa: deploy ${{ env.IMAGE_TAG }}"
                  body: |
                      ## 🚀 QA Deployment (ECS Blue/Green nativo)
                      Updating images to `${{ env.IMAGE_TAG }}`.

                      ## 🛠 Atlantis Commands
                      ```bash
                      atlantis plan -p aws-qa-app-services-ecs-ec2
                      ```
                      ```bash
                      atlantis apply -p aws-qa-app-services-ecs-ec2
                      ```

    # ---- E2E matrix on QA cloud ---------------------------------------
    # Fires AFTER the GitOps PR is opened + (auto-)applied. The matrix
    # tests the QA cloud URL as a tenant, not the freshly-built image
    # directly — so atlantis must finish first. cancel-in-progress on the
    # called workflow collapses a rajada de merges into a single run, and
    # the nightly cron there is the catch-all so a quiet day still gets
    # one signal.
    #
    # NOTE: this fires AS SOON AS the infra PR is opened, but the actual
    # rollout depends on the auto-apply label + atlantis run in the infra
    # repo. There's a small race where the matrix may hit the previous
    # image. In practice the matrix takes longer than the rollout, so by
    # the time the cells reach review-trigger steps the new image is live.
    # If that ever becomes a flake source, gate this on a separate
    # `workflow_run` event from the infra repo instead.
    e2e-cloud:
        name: E2E matrix on QA cloud
        needs: build_push_and_open_pr
        if: needs.build_push_and_open_pr.result == 'success'
        permissions:
            contents: read
        uses: ./.github/workflows/e2e-cloud.yml
        with:
            image_tag: ${{ github.event.inputs.image_tag || github.sha }}
            matrix_file: matrix/fast.yml
        secrets: inherit

    notify-build-failure:
        # The actual build job has Trivy + AWS + Docker + GitOps steps;
        # any of them failing leaves QA stuck on the previous image with
        # no signal. Surface that to #qa-ci so the team notices before
        # the next merge wonders why their changes never reached QA.
        name: Notify Discord (build/deploy failure only)
        needs: build_push_and_open_pr
        if: always() && needs.build_push_and_open_pr.result == 'failure'
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/discord-notify
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_INTERNAL || secrets.DISCORD_WEBHOOK }}
                  status: failure
                  title: "❌ QA backend build/deploy failed"
                  description: |
                      Image `${{ github.sha }}` did not roll out to QA.
                      Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
