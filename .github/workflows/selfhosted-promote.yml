name: "Self-Hosted: Promote RC to final"

# Promotes a validated RC image to the customer-visible tag. Designed to be
# called by selfhosted-build-push.yml after the matrix E2E passes, but can
# also be invoked manually to re-promote a previously validated RC.
#
# Promotion is retag-only — NO REBUILD. Same digest goes from rc.N to final.

on:
    workflow_call:
        inputs:
            rc_version:
                description: "RC version (e.g. 1.42.0-rc.3)"
                required: true
                type: string
            release_version:
                description: "Final version (e.g. 1.42.0)"
                required: true
                type: string
            release_tag:
                description: "Final git tag (e.g. selfhosted-1.42.0)"
                required: true
                type: string
            hotfix:
                description: "Bypass the human release gate (for P0 hotfixes only)"
                required: false
                type: boolean
                default: false
        outputs:
            promoted:
                value: ${{ jobs.promote.outputs.promoted }}
    workflow_dispatch:
        inputs:
            rc_version:
                description: "RC version (e.g. 1.42.0-rc.3)"
                required: true
                type: string
            release_version:
                description: "Final version (e.g. 1.42.0)"
                required: true
                type: string
            release_tag:
                description: "Final git tag (e.g. selfhosted-1.42.0)"
                required: true
                type: string
            hotfix:
                description: "Bypass the human release gate (for P0 hotfixes only)"
                required: false
                type: boolean
                default: false

concurrency:
    group: selfhosted-promote-${{ inputs.release_version }}
    cancel-in-progress: false

jobs:
    promote:
        name: Retag images + git tag
        runs-on: ubuntu-latest
        # Friday release flow: `production` is the gated env — already has
        # required reviewers (Gabriel, Wellington, Junior). The pipeline
        # pauses here until one approves, which is the ~13h "click after
        # QA day + meeting" of the locked release cadence.
        # P0 hotfix flow: `hotfix: true` switches to `production-hotfix`,
        # a separate env you must create in repo settings WITHOUT required
        # reviewers, so a critical fix ships immediately after the matrix.
        environment: ${{ inputs.hotfix && 'production-hotfix' || 'production' }}
        permissions:
            contents: write
            packages: write
        outputs:
            promoted: ${{ steps.retag.outputs.promoted }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0
                  token: ${{ secrets.RELEASE_BOT_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4.0.0

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Retag images (rc -> final + latest)
              id: retag
              env:
                  RC_VERSION: ${{ inputs.rc_version }}
                  RELEASE_VERSION: ${{ inputs.release_version }}
                  OWNER: ${{ github.repository_owner }}
              run: |
                  set -euo pipefail
                  for image in kodus-ai-api kodus-ai-webhook kodus-ai-worker kodus-ai-web kodus-mcp-manager; do
                    SRC="ghcr.io/${OWNER}/${image}:${RC_VERSION}"
                    DST_VER="ghcr.io/${OWNER}/${image}:${RELEASE_VERSION}"
                    DST_LATEST="ghcr.io/${OWNER}/${image}:latest"
                    echo "Retagging $SRC -> $DST_VER + $DST_LATEST"
                    docker buildx imagetools create -t "$DST_VER" -t "$DST_LATEST" "$SRC"
                  done
                  echo "promoted=true" >> "$GITHUB_OUTPUT"

            - name: Create final git tag
              env:
                  TAG: ${{ inputs.release_tag }}
              run: |
                  set -euo pipefail
                  if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
                    echo "Tag ${TAG} already exists on origin. Skipping."
                    exit 0
                  fi
                  git config user.name "kodus-release-bot"
                  git config user.email "actions@kodus.io"
                  git tag "${TAG}"
                  git push origin "${TAG}"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2.0.4
              with:
                  tag_name: ${{ inputs.release_tag }}
                  name: "Self-Hosted Release ${{ inputs.release_version }}"
                  generate_release_notes: true
                  prerelease: false
