name: "Self-Hosted: Send Discord Notification"

# Manual fallback. The release flow already posts to Discord via the
# automated notify-discord-failure inside selfhosted-build-push.yml and
# the changelog publish in changelog-publish.yml — use this only when
# you need to push a status to the team channel out-of-band (e.g. you
# canceled a release mid-flight and want to tell people).

on:
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Self-hosted release tag (e.g. selfhosted-2.0.19)"
                required: true
                type: string
            status:
                description: "Notification status"
                required: true
                default: "success"
                type: choice
                options:
                    - success
                    - failure

permissions:
    contents: read

jobs:
    notify-discord:
        name: Notify Discord
        runs-on: ubuntu-latest
        environment: production
        permissions: {}
        steps:
            - name: Notify Discord
              uses: sarisia/actions-status-discord@v1.16.0
              with:
                  # Same fallback chain every release-pipeline notification uses.
                  webhook: ${{ secrets.DISCORD_WEBHOOK_INTERNAL || secrets.DISCORD_WEBHOOK_SELFHOSTED || secrets.DISCORD_WEBHOOK }}
                  status: ${{ github.event.inputs.status }}
                  title: ${{ github.event.inputs.status == 'success' && 'Self-Hosted Release' || 'Self-Hosted Release Failed' }}
                  description: |
                      Release tag: `${{ github.event.inputs.release_tag }}`
                      Status:      ${{ github.event.inputs.status }}
                      Sent manually by: @${{ github.actor }}
                      Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                  username: "GitHub Actions"
