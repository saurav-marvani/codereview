name: "E2E: cloud matrix"

# Minimal token scope — CodeQL actions/missing-workflow-permissions.
# Job only reads the repo (checkout); provider/cloud creds come from
# secrets, not GITHUB_TOKEN.
permissions:
    contents: read

# Runs the canonical e2e matrix against the cloud QA target. Mirrors
# `yarn e2e:matrix matrix/fast.yml --target cloud` locally:
#   - Same matrix YAML (tests/e2e/matrix/fast.yml) — single source of
#     truth. Adding a scenario or cell to fast.yml is automatically
#     picked up by CI; no parallel matrix list to keep in sync.
#   - Same skip-missing-tokens behaviour — a cell without its provider
#     token is SKIPPED, not failed (community forks, partial setups).
#   - Same internal parallelism — the matrix runner (run-matrix.ts)
#     fans out cells via Promise.allSettled, so a single job here is
#     already concurrent across cells.
#
# Trigger:
#   - workflow_call from qa-build-push-and-pr-green.yml after the GitOps
#     PR for the QA deploy is opened.
#   - schedule nightly 05:17 UTC — catch-all for drift / provider
#     regressions / flaky cells that don't reproduce per-deploy.
#   - workflow_dispatch for manual runs.

on:
    workflow_call:
        inputs:
            image_tag:
                description: "Image tag deployed to cloud QA (informational only)"
                required: false
                type: string
                default: ""
            matrix_file:
                description: "Matrix YAML path under tests/e2e/"
                required: false
                default: matrix/fast.yml
                type: string
    schedule:
        # 05:17 UTC = ~02:17 BRT. Off-peak; offset from the benchmark
        # cron (which lives at 04:17 UTC) so they don't share a runner
        # spike.
        - cron: "17 5 * * *"
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Image tag deployed to cloud QA (informational only)"
                required: false
                default: ""
                type: string
            matrix_file:
                description: "Matrix YAML path under tests/e2e/"
                required: false
                default: matrix/fast.yml
                type: string

concurrency:
    group: e2e-cloud-${{ inputs.image_tag || github.sha }}
    cancel-in-progress: true

jobs:
    cloud-matrix:
        name: cloud matrix (${{ inputs.matrix_file || 'matrix/fast.yml' }})
        runs-on: ubuntu-latest
        # fast.yml = ~30-45 min, full.yml = ~75-120 min. Cap with
        # generous headroom; cell-level timeouts inside the runner stop
        # individual flakes from eating the whole budget.
        timeout-minutes: 150
        steps:
            - name: Checkout monorepo
              uses: actions/checkout@v6.0.2

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install e2e deps
              working-directory: tests/e2e
              run: npm install --no-audit --no-fund

            # Seed the cloud tenant registry. The runner resolves each cloud
            # cell's tenant by (provider, license) from ~/.kodus-dev/cloud-
            # tenants.json (runner.ts:readCloudTenantsFile). Locally that file
            # exists; in CI it didn't, so every cell fell back to the per-
            # license env vars — which only cover free/trial/paid GITHUB, so
            # paid-bitbucket / paid-azure / community-byok had no tenant (and
            # the github-paid fallback lacks the bitbucket/azure connected
            # repos → "repo not in integration's available list"). Writing the
            # file restores the exact per-provider tenants the local runs used.
            - name: Seed cloud tenants registry
              env:
                  CLOUD_TENANTS_JSON: ${{ secrets.CLOUD_TENANTS_JSON }}
              run: |
                  if [ -z "${CLOUD_TENANTS_JSON:-}" ]; then
                      echo "::warning::CLOUD_TENANTS_JSON secret empty — cells fall back to per-license env vars (github only)"
                      exit 0
                  fi
                  mkdir -p "$HOME/.kodus-dev"
                  printf '%s' "$CLOUD_TENANTS_JSON" > "$HOME/.kodus-dev/cloud-tenants.json"
                  COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.env.HOME+'/.kodus-dev/cloud-tenants.json','utf8')).length)")
                  echo "Seeded $COUNT cloud tenants"

            - name: Wait for QA backend to be healthy (avoid deploy-race 403s)
              env:
                  TARGET_WEB_URL: ${{ vars.CLOUD_QA_WEB_URL || 'https://qa.web.kodus.io' }}
              run: |
                  set -uo pipefail
                  BASE="${TARGET_WEB_URL%/}/api/proxy/api"
                  # Chained right after the QA GitOps deploy, the backend can still
                  # be rolling out: the gateway then answers every request with an
                  # nginx "403 Forbidden" (or 5xx / connection-refused), and the
                  # matrix reports 40+ confusing `onboarding:login HTTP 403` cell
                  # failures. Probe the auth layer with a throwaway bad-cred login
                  # until it responds at the APP level (a real 400/401 for bad
                  # creds) instead of the gateway, so the run starts against a
                  # ready backend. A healthy QA passes on the first attempt.
                  echo "Probing $BASE/auth/login for app-level readiness…"
                  for i in $(seq 1 60); do
                      code=$(curl -sS -o /dev/null -w '%{http_code}' \
                          -X POST "$BASE/auth/login" \
                          -H 'Content-Type: application/json' \
                          -d '{"email":"readiness-probe@invalid.kodus","password":"x"}' \
                          2>/dev/null || echo 000)
                      case "$code" in
                          200|201|400|401|404|422)
                              echo "QA auth healthy (bad-cred login → HTTP $code) after $i attempt(s)."
                              exit 0 ;;
                          *)
                              echo "attempt $i/60: HTTP $code (gateway/rollout) — waiting 10s…"
                              sleep 10 ;;
                      esac
                  done
                  echo "::error::QA backend never reached app-level readiness in ~10min — aborting before the matrix to avoid deploy-race false failures."
                  exit 1

            - name: Run cloud matrix
              env:
                  # target.sh expects TARGET_BASE_URL + TARGET_WEB_URL.
                  # vars.CLOUD_QA_* canonicalise the URLs; the matrix
                  # runner ignores TARGET_BASE_URL for cloud target (it
                  # derives the API from web URL + /api/proxy/api) but
                  # target.sh requires it set, so we still export it.
                  TARGET_BASE_URL: ${{ vars.CLOUD_QA_API_URL || 'https://qa.api.kodus.io' }}
                  TARGET_WEB_URL: ${{ vars.CLOUD_QA_WEB_URL || 'https://qa.web.kodus.io' }}
                  MATRIX_FILE: ${{ inputs.matrix_file || 'matrix/fast.yml' }}

                  # Provider tokens — cells without the right token are
                  # skipped (target.sh passes --skip-missing-tokens).
                  GH_TEST_TOKEN: ${{ secrets.GH_TEST_TOKEN }}
                  GH_TEST_REPO: ${{ secrets.GH_TEST_REPO }}
                  GH_TEST_REPO_CLOUD: ${{ secrets.GH_TEST_REPO_CLOUD }}
                  GH_TEST_PR_NUMBER: ${{ secrets.GH_TEST_PR_NUMBER }}

                  GL_TEST_TOKEN: ${{ secrets.GL_TEST_TOKEN }}
                  GL_TEST_REPO: ${{ secrets.GL_TEST_REPO }}
                  GL_TEST_REPO_CLOUD: ${{ secrets.GL_TEST_REPO_CLOUD }}
                  GL_TEST_MR_IID: ${{ secrets.GL_TEST_MR_IID }}

                  BB_TEST_USER: ${{ secrets.BB_TEST_USER }}
                  BB_TEST_APP_PASSWORD: ${{ secrets.BB_TEST_APP_PASSWORD }}
                  BB_TEST_REPO: ${{ secrets.BB_TEST_REPO }}
                  BB_TEST_REPO_CLOUD: ${{ secrets.BB_TEST_REPO_CLOUD }}
                  BB_TEST_PR_ID: ${{ secrets.BB_TEST_PR_ID }}

                  AZ_TEST_TOKEN: ${{ secrets.AZ_TEST_TOKEN }}
                  AZ_TEST_ORG: ${{ secrets.AZ_TEST_ORG }}
                  AZ_TEST_PROJECT: ${{ secrets.AZ_TEST_PROJECT }}
                  AZ_TEST_REPO: ${{ secrets.AZ_TEST_REPO }}
                  AZ_TEST_REPO_CLOUD: ${{ secrets.AZ_TEST_REPO_CLOUD }}
                  AZ_TEST_PR_ID: ${{ secrets.AZ_TEST_PR_ID }}

                  CLOUD_TENANT_PAID_EMAIL: ${{ secrets.CLOUD_TENANT_PAID_EMAIL }}
                  CLOUD_TENANT_PAID_PASSWORD: ${{ secrets.CLOUD_TENANT_PAID_PASSWORD }}
                  CLOUD_TENANT_TRIAL_EMAIL: ${{ secrets.CLOUD_TENANT_TRIAL_EMAIL }}
                  CLOUD_TENANT_TRIAL_PASSWORD: ${{ secrets.CLOUD_TENANT_TRIAL_PASSWORD }}
                  CLOUD_TENANT_FREE_EMAIL: ${{ secrets.CLOUD_TENANT_FREE_EMAIL }}
                  CLOUD_TENANT_FREE_PASSWORD: ${{ secrets.CLOUD_TENANT_FREE_PASSWORD }}
              run: bash tests/e2e/provisioning/cloud/target.sh

            - name: Upload evidence
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-cloud-matrix
                  path: tests/e2e/evidence/
                  if-no-files-found: warn
                  retention-days: 30

            - name: Notify Discord on failure
              if: failure()
              uses: ./.github/actions/discord-notify
              with:
                  # Per-channel secret with fallback to the general webhook so
                  # nothing goes silent if DISCORD_WEBHOOK_INTERNAL isn't created yet.
                  webhook: ${{ secrets.DISCORD_WEBHOOK_INTERNAL || secrets.DISCORD_WEBHOOK }}
                  status: failure
                  title: "❌ E2E cloud matrix failed"
                  description: |
                      `${{ inputs.matrix_file || 'matrix/fast.yml' }}` failed against QA cloud (${{ vars.CLOUD_QA_WEB_URL || 'https://qa.web.kodus.io' }}).
                      Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                      Trigger: ${{ github.event_name }}${{ github.event_name == 'schedule' && ' (nightly catch-all)' || '' }}
