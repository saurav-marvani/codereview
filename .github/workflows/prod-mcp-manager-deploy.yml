name: "MCP Manager: Production EC2 Deploy"

# Ported 1:1 from kodustech/kodus-mcp-manager/.github/workflows/prod-ec2-deploy.yml
# when that repo was merged into apps/mcp-manager. Keeps the SSH +
# start-app.sh deploy pattern; the GitOps backend pipeline does not
# (yet) own mcp-manager.
#
# Build uses `--target=mcp-manager` against the unified docker/Dockerfile
# (shared with api/webhooks/worker).
#
# Triggered by GitHub Releases tagged `mcp-manager-X.Y.Z` (mirrors the
# `web-*` / `selfhosted-*` convention used elsewhere in this monorepo).
# A pre-release does NOT deploy. Manual `workflow_dispatch` accepts an
# optional image_tag input, falling back to `github.sha`.

on:
    release:
        types:
            - published
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Docker image tag to build/push (default: github.sha)"
                required: false

permissions:
    contents: read
    deployments: write

jobs:
    build_and_push_image:
        name: Build and push image
        runs-on: ubuntu-latest
        environment: PRODUCTION
        if: |
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'release' &&
             github.event.release.prerelease == false &&
             startsWith(github.event.release.tag_name, 'mcp-manager-'))
        outputs:
            image_tag: ${{ steps.tag.outputs.image_tag }}
        permissions:
            contents: read
            # Required by github/codeql-action/upload-sarif to publish
            # Trivy findings to the repo's Security tab.
            security-events: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Resolve image tag
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                      TAG="${{ github.event.inputs.image_tag }}"
                      if [ -z "$TAG" ]; then
                          TAG="${{ github.sha }}"
                      fi
                  else
                      TAG="${{ github.event.release.tag_name }}"
                  fi
                  echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: us-east-1

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build, tag, and push image to Amazon ECR
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: kodus-mcp-manager-prod
                  IMAGE_TAG_VERSION: ${{ steps.tag.outputs.image_tag }}
                  IMAGE_TAG_SHA: ${{ github.sha }}
              run: |
                  docker buildx build \
                      --file docker/Dockerfile \
                      --target mcp-manager \
                      --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_VERSION \
                      --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_SHA \
                      --cache-from type=gha,scope=mcp-manager-prod \
                      --cache-to type=gha,scope=mcp-manager-prod,mode=max \
                      --push \
                      .

            # ---- CVE scan -----------------------------------------------------
            # Mirrors web-build-push-production.yml. Advisory-only (exit-code:0)
            # to match the existing posture; flip to "1" once CVE backlog is
            # triaged to block on CRITICAL/HIGH.
            - name: Trivy scan — kodus-mcp-manager
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ steps.login-ecr.outputs.registry }}/kodus-mcp-manager-prod:${{ steps.tag.outputs.image_tag }}
                  format: "sarif"
                  output: "trivy-mcp-manager.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Upload Trivy SARIF reports
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: "trivy-mcp-manager.sarif"
                  category: "trivy-prod-mcp-manager"

            - name: Log out of Amazon ECR
              if: always()
              run: docker logout ${{ steps.login-ecr.outputs.registry }}

    deploy_in_server:
        name: Deploy in server
        runs-on: ubuntu-latest
        environment: PRODUCTION
        needs: build_and_push_image

        steps:
            - name: Get runner IP
              run: |
                  ip=$(curl -s https://ipinfo.io/ip)
                  echo "runner_ip=$ip" >> $GITHUB_ENV

            - name: Add Github Actions IP to Security group (SSH inbound)
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
              run: |
                  aws ec2 authorize-security-group-ingress \
                      --group-id ${{ secrets.AWS_SECURITY_GROUP }} \
                      --protocol tcp --port 22 \
                      --cidr ${{ env.runner_ip }}/32

            - name: Execute start-app.sh on EC2
              uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.AWS_PROD_HOST }}
                  username: ${{ secrets.AWS_PROD_USERNAME }}
                  key: ${{ secrets.AWS_PROD_KEY_SSH }}
                  script: |
                      cd ~/kodus-mcp-manager
                      ./start-app.sh prod ${{ needs.build_and_push_image.outputs.image_tag }} ${{ github.ref }}

            - name: Remove Github Actions IP from security group
              if: always()
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
              run: |
                  aws ec2 revoke-security-group-ingress \
                      --group-id ${{ secrets.AWS_SECURITY_GROUP }} \
                      --protocol tcp --port 22 \
                      --cidr ${{ env.runner_ip }}/32

            - name: Notify Discord
              if: always()
              uses: sarisia/actions-status-discord@v1.16.0
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_INTERNAL || secrets.DISCORD_WEBHOOK }}
                  status: ${{ job.status }}
                  title: "Deploy Prod: kodus-mcp-manager"
                  description: |
                      SHA: `${{ github.sha }}`
                      Triggered by: @${{ github.actor }}
                      Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                  username: GitHub Actions
