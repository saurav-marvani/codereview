name: "Self-Hosted: Release, Build and Publish"

on:
    workflow_dispatch:
        inputs:
            version_type:
                description: "Self-hosted release type (semver)"
                required: true
                default: "patch"
                type: choice
                options:
                    - patch
                    - minor
                    - major
                    - custom
            custom_version:
                description: "Custom self-hosted version (e.g. 0.12.0 or selfhosted-0.12.0) -
                    required if type is custom"
                required: false

jobs:
    create-release:
        name: Create Release and Tag
        runs-on: ubuntu-latest
        outputs:
            release_tag: ${{ steps.bump.outputs.release_tag }}
            release_version: ${{ steps.bump.outputs.release_version }}
        permissions:
            contents: write
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0

            - name: Get Latest Release
              id: get_latest
              run: |
                  set -euo pipefail
                  # Get latest self-hosted semver tag
                  LATEST_TAG=$(git tag --sort=-v:refname | awk '/^selfhosted-[0-9]+\.[0-9]+\.[0-9]+$/{print; exit}')
                  if [ -z "${LATEST_TAG}" ]; then
                    LATEST_TAG="selfhosted-0.0.0"
                  fi
                  echo "Latest self-hosted tag: $LATEST_TAG"
                  echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

            - name: Bump Version
              id: bump
              run: |
                  set -euo pipefail
                  LATEST="${{ steps.get_latest.outputs.latest_tag }}"
                  if [[ ! "$LATEST" =~ ^selfhosted-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Invalid latest tag format: $LATEST (expected selfhosted-MAJOR.MINOR.PATCH)"
                    exit 1
                  fi

                  VERSION=${LATEST#selfhosted-}

                  IFS='.' read -r -a parts <<< "$VERSION"
                  MAJOR=${parts[0]}
                  MINOR=${parts[1]}
                  PATCH=${parts[2]}

                  TYPE="${{ github.event.inputs.version_type }}"

                  if [ "$TYPE" == "custom" ]; then
                    NEW_VERSION="${{ github.event.inputs.custom_version }}"
                    if [ -z "$NEW_VERSION" ]; then
                      echo "custom_version is required when version_type=custom"
                      exit 1
                    fi
                    # Normalize accepted custom formats: selfhosted-x.y.z, vX.Y.Z or X.Y.Z
                    NEW_VERSION=${NEW_VERSION#selfhosted-}
                    NEW_VERSION=${NEW_VERSION#v}
                    if [[ ! "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "Invalid custom version: $NEW_VERSION (expected MAJOR.MINOR.PATCH)"
                      exit 1
                    fi
                  elif [ "$TYPE" == "major" ]; then
                    MAJOR=$((MAJOR + 1))
                    MINOR=0
                    PATCH=0
                    NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                  elif [ "$TYPE" == "minor" ]; then
                    MINOR=$((MINOR + 1))
                    PATCH=0
                    NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                  else
                    PATCH=$((PATCH + 1))
                    NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                  fi

                  RELEASE_TAG="selfhosted-${NEW_VERSION}"
                  echo "New self-hosted version: $NEW_VERSION"
                  echo "New self-hosted tag: $RELEASE_TAG"
                  echo "release_version=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

            - name: Ensure Git Tag Exists
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  TAG="${{ steps.bump.outputs.release_tag }}"
                  if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" > /dev/null 2>&1; then
                    echo "Tag ${TAG} already exists on origin. Skipping creation."
                    exit 0
                  fi

                  git config user.name "GitHub Actions"
                  git config user.email "actions@github.com"
                  git tag "${TAG}"
                  git push origin "${TAG}"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2.0.4
              with:
                  tag_name: ${{ steps.bump.outputs.release_tag }}
                  name: "Self-Hosted Release ${{ steps.bump.outputs.release_version }}"
                  generate_release_notes: true
                  prerelease: false

    build-and-push:
        name: Build and Push Docker Images
        needs: create-release
        runs-on: ubuntu-latest
        environment: production
        permissions:
            contents: read
            packages: write
            # Required by github/codeql-action/upload-sarif to publish
            # Trivy findings to the repo's Security tab.
            security-events: write
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6.0.2
              with:
                  ref: ${{ needs.create-release.outputs.release_tag }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4.0.0
              with:
                  platforms: amd64,arm64

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4.0.0

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push Docker Images
              env:
                  TAG: ${{ needs.create-release.outputs.release_version }}
                  API_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-ai-api:${{
                      needs.create-release.outputs.release_version
                      }},ghcr.io/${{ github.repository_owner
                      }}/kodus-ai-api:latest
                  WEBHOOKS_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-ai-webhook:${{
                      needs.create-release.outputs.release_version
                      }},ghcr.io/${{ github.repository_owner
                      }}/kodus-ai-webhook:latest
                  WORKER_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-ai-worker:${{
                      needs.create-release.outputs.release_version
                      }},ghcr.io/${{ github.repository_owner
                      }}/kodus-ai-worker:latest
                  WEB_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-ai-web:${{
                      needs.create-release.outputs.release_version
                      }},ghcr.io/${{ github.repository_owner
                      }}/kodus-ai-web:latest
                  MCP_MANAGER_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-mcp-manager:${{
                      needs.create-release.outputs.release_version
                      }},ghcr.io/${{ github.repository_owner
                      }}/kodus-mcp-manager:latest
              run: |
                  set -euo pipefail

                  docker buildx bake -f docker-bake.hcl \
                    --set base.args.RELEASE_VERSION=${TAG} \
                    --set base.args.API_CLOUD_MODE=false \
                    --set base.cache-from=type=gha \
                    --set base.cache-to=type=gha,mode=max \
                    --set *.platform=linux/amd64,linux/arm64 \
                    --push

            # ---- CVE scan -----------------------------------------------------
            # Trivy scans each published image for CRITICAL/HIGH CVEs with a
            # known fix available (`ignore-unfixed: true` skips noise from
            # distro packages that have no patch yet). `exit-code: 0` makes
            # findings advisory for now — flip to `1` once the current backlog
            # is triaged so new criticals block the release.
            - name: Trivy scan — kodus-ai-api
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-ai-api:${{
                      needs.create-release.outputs.release_version }}
                  format: "sarif"
                  output: "trivy-api.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-ai-webhook
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-ai-webhook:${{
                      needs.create-release.outputs.release_version }}
                  format: "sarif"
                  output: "trivy-webhook.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-ai-worker
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-ai-worker:${{
                      needs.create-release.outputs.release_version }}
                  format: "sarif"
                  output: "trivy-worker.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-ai-web
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-ai-web:${{
                      needs.create-release.outputs.release_version }}
                  format: "sarif"
                  output: "trivy-web.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-mcp-manager
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-mcp-manager:${{
                      needs.create-release.outputs.release_version }}
                  format: "sarif"
                  output: "trivy-mcp-manager.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            # CodeQL Action v4 rejects multiple SARIF runs sharing a
            # category — one upload step per image with its own category.
            - name: Upload Trivy SARIF — api
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-api.sarif
                  category: trivy-selfhosted-api

            - name: Upload Trivy SARIF — webhook
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-webhook.sarif
                  category: trivy-selfhosted-webhook

            - name: Upload Trivy SARIF — worker
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-worker.sarif
                  category: trivy-selfhosted-worker

            - name: Upload Trivy SARIF — web
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-web.sarif
                  category: trivy-selfhosted-web

            - name: Upload Trivy SARIF — mcp-manager
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: trivy-mcp-manager.sarif
                  category: trivy-selfhosted-mcp-manager

    cli-changes:
        name: Detect CLI changes since last release
        needs:
            - create-release
            - build-and-push
            # Serialize against `changelog-publish`, which may push a
            # `docs(changelog)` commit to main. If both jobs raced, the
            # loser would hit a non-fast-forward and either drop the
            # changelog commit or abort the CLI release. Checking out
            # main after `changelog-publish` finishes guarantees we
            # bump on top of its commit when there is one.
            - changelog-publish
        # `always()` so a `changelog-publish` failure (e.g. Gemini
        # outage) doesn't gate the independent CLI release path.
        if: always() && needs.build-and-push.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            should_release: ${{ steps.detect.outputs.should_release }}
            new_tag: ${{ steps.detect.outputs.new_tag }}
            new_version: ${{ steps.detect.outputs.new_version }}
        steps:
            - name: Checkout main (full history + tags)
              uses: actions/checkout@v6.0.2
              with:
                  ref: main
                  fetch-depth: 0
                  fetch-tags: true
                  # Main is protected by a ruleset that requires PRs.
                  # The default GITHUB_TOKEN cannot bypass it; only the
                  # OrganizationAdmin actor can. RELEASE_BOT_TOKEN must
                  # be a fine-grained PAT minted by an org admin with
                  # `contents: write` on this repo — its bypass rights
                  # are inherited from the underlying admin user.
                  token: ${{ secrets.RELEASE_BOT_TOKEN }}

            - name: Detect CLI changes
              id: detect
              env:
                  RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
              run: |
                  set -euo pipefail

                  LAST_TAG=$(git tag --sort=-v:refname | awk '/^cli-v[0-9]+\.[0-9]+\.[0-9]+$/{print; exit}')
                  if [ -z "$LAST_TAG" ]; then
                      echo "No previous cli-v* tag — treating as first release."
                      CHANGED=1
                  else
                      echo "Comparing $LAST_TAG..$RELEASE_TAG for apps/cli/ changes"
                      CHANGED=$(git diff --name-only "$LAST_TAG" "$RELEASE_TAG" -- apps/cli/ | wc -l | xargs)
                  fi
                  echo "Changed file count: $CHANGED"

                  CURRENT_VERSION=$(node -p "require('./apps/cli/package.json').version")
                  echo "Current apps/cli version: $CURRENT_VERSION"

                  if [ "$CHANGED" -gt 0 ]; then
                      IFS='.' read -ra PARTS <<< "$CURRENT_VERSION"
                      NEW_VERSION="${PARTS[0]}.${PARTS[1]}.$((PARTS[2] + 1))"
                      NEW_TAG="cli-v$NEW_VERSION"
                      echo "CLI changes present — bumping $CURRENT_VERSION -> $NEW_VERSION ($NEW_TAG)"
                      {
                          echo "should_release=true"
                          echo "new_version=$NEW_VERSION"
                          echo "new_tag=$NEW_TAG"
                      } >> "$GITHUB_OUTPUT"
                  else
                      echo "No CLI changes since $LAST_TAG; skipping CLI release."
                      echo "should_release=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Bump version, commit, push tag
              if: steps.detect.outputs.should_release == 'true'
              env:
                  NEW_VERSION: ${{ steps.detect.outputs.new_version }}
                  NEW_TAG: ${{ steps.detect.outputs.new_tag }}
              run: |
                  set -euo pipefail

                  node -e "
                      const fs = require('fs');
                      const path = './apps/cli/package.json';
                      const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
                      pkg.version = process.env.NEW_VERSION;
                      fs.writeFileSync(path, JSON.stringify(pkg, null, 4) + '\n');
                  "

                  git config user.name "kodus-release-bot"
                  git config user.email "actions@kodus.io"
                  git add apps/cli/package.json
                  git commit -m "chore(cli): bump version to $NEW_VERSION"
                  # Push the bump commit and the tag separately so a
                  # transient main divergence (rare, but possible if
                  # someone merged between create-release and this job)
                  # fails fast with a clear message instead of leaving an
                  # orphan tag behind.
                  git push origin HEAD:main
                  git tag "$NEW_TAG"
                  git push origin "$NEW_TAG"

    cli-release:
        name: Publish CLI release
        needs:
            - cli-changes
        if: needs.cli-changes.outputs.should_release == 'true'
        # GITHUB_TOKEN pushes don't cascade into other workflows, so
        # cli-release.yml's `push: tags` trigger would never fire for
        # the tag we just pushed. Call it explicitly via workflow_call
        # instead.
        permissions:
            contents: write
            id-token: write
        uses: ./.github/workflows/cli-release.yml
        with:
            tag: ${{ needs.cli-changes.outputs.new_tag }}
        secrets: inherit

    changelog-publish:
        name: Publish changelog
        needs:
            - create-release
            - build-and-push
        if: needs.build-and-push.result == 'success'
        # Same cascading-events restriction as cli-release: the
        # selfhosted-X.Y.Z tag was pushed by GITHUB_TOKEN above, so the
        # changelog-publish.yml `push: tags` trigger does not fire. Invoke
        # the publish workflow directly.
        permissions:
            contents: write
        uses: ./.github/workflows/changelog-publish.yml
        with:
            tag: ${{ needs.create-release.outputs.release_tag }}
        secrets: inherit

    notify-discord-failure:
        name: Notify Discord (failure only)
        needs:
            - create-release
            - build-and-push
        # Success notifications are owned by `changelog-publish` (rich
        # release notes via Gemini). This job only fires the failure
        # path so we still get a Discord ping when the build collapses
        # before changelog-publish has a chance to run.
        if: always() && needs.create-release.result == 'success' &&
            needs.build-and-push.result != 'success'
        runs-on: ubuntu-latest
        environment: production
        permissions: {}
        steps:
            - name: Check Discord webhook configuration
              id: discord-webhook
              run: |
                  if [ -n "${{ secrets.DISCORD_WEBHOOK_SELFHOSTED }}" ]; then
                    echo "configured=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "configured=false" >> "$GITHUB_OUTPUT"
                    echo "DISCORD_WEBHOOK_SELFHOSTED is not configured for the production environment."
                  fi

            - name: Notify Discord on Failure
              if: steps.discord-webhook.outputs.configured == 'true'
              uses: sarisia/actions-status-discord@v1.16.0
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_SELFHOSTED }}
                  content: ":x: Failed to publish self-hosted release `${{
                      needs.create-release.outputs.release_tag }}`."
                  title: "Self-Hosted Release Failed"
                  description: "The self-hosted release workflow did not complete successfully.
                      Check the workflow logs for details."
                  username: "GitHub Actions"
                  color: 0xff0000
