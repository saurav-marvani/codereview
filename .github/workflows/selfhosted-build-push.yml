name: "Self-Hosted: Release, Build, Validate and Publish"

# Self-hosted release pipeline with mandatory E2E validation before any
# customer-visible tag is published.
#
# Flow:
#   1) plan-release           — compute final version + RC version
#   2) create-rc-tag          — push selfhosted-X.Y.Z-rc.<run> at the SHA
#   3) build-and-push (RC)    — build images and push :X.Y.Z-rc.<run> ONLY
#                                (no :X.Y.Z, no :latest yet)
#   4) e2e-self-hosted-matrix — provider × license matrix against the RC
#                                (workflow_call into e2e-self-hosted-matrix.yml)
#   5) promote                — retag :rc → :X.Y.Z + :latest, push final
#                                git tag, create GitHub Release
#                                (workflow_call into selfhosted-promote.yml)
#   6) cli-changes/cli-release — only fires after promote
#   7) changelog-publish      — only fires after promote, on FINAL tag

on:
    workflow_dispatch:
        inputs:
            version_type:
                description: "Self-hosted release type (semver)"
                required: true
                default: "patch"
                type: choice
                options:
                    - patch
                    - minor
                    - major
                    - custom
            custom_version:
                description: "Custom self-hosted version (e.g. 0.12.0 or selfhosted-0.12.0) - required if type is custom"
                required: false
            hotfix:
                description: "P0 hotfix — bypass the human release gate at promote (matrix still runs)"
                required: false
                default: false
                type: boolean

jobs:
    # ----------------------------------------------------------------
    # Freeze main while the release is in flight. The repo ruleset
    # `release-freeze` lives in this repo's settings (id 17004627);
    # default state is enforcement=disabled. We flip it to active here
    # so no new PRs can land in `main` between RC build and customer
    # ship. Hotfix path skips the freeze — emergencies are short
    # enough that locking main would make things worse.
    # `unfreeze-main` below runs `if: always()` so an unexpected
    # failure here doesn't leave main frozen forever.
    # Failsafe NOTE: if the runner is killed mid-flight (rare), the
    # freeze stays active. Manually disable via:
    #   gh api -X PUT repos/${REPO}/rulesets/17004627 \
    #     --input <(jq '.enforcement="disabled"' <(gh api repos/${REPO}/rulesets/17004627))
    # ----------------------------------------------------------------
    freeze-main:
        name: 🧊 Freeze main (block merges during release)
        if: ${{ inputs.hotfix == false }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Activate release-freeze ruleset
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
                  RULESET_ID: 17004627
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail
                  echo "Activating ruleset $RULESET_ID on $REPO ..."
                  # PUT replaces the whole ruleset, so fetch current state
                  # and patch only the enforcement field — keeps rules + bypass
                  # actors intact across releases.
                  CURRENT=$(gh api "repos/${REPO}/rulesets/${RULESET_ID}")
                  echo "$CURRENT" | jq '.enforcement="active"' > /tmp/ruleset.json
                  gh api --method PUT "repos/${REPO}/rulesets/${RULESET_ID}" --input /tmp/ruleset.json | jq '{name, enforcement}'
                  echo "::notice::main is now frozen — no PRs can merge until unfreeze-main runs."

    plan-release:
        name: Plan release (compute version and RC version)
        needs: freeze-main
        # Run on freeze success (normal release) OR skip (hotfix path).
        # Don't run if freeze failed — that indicates an admin / token /
        # ruleset bug and we shouldn't ship with main potentially open.
        if: ${{ needs.freeze-main.result == 'success' || needs.freeze-main.result == 'skipped' }}
        runs-on: ubuntu-latest
        outputs:
            release_version: ${{ steps.bump.outputs.release_version }}
            release_tag: ${{ steps.bump.outputs.release_tag }}
            rc_version: ${{ steps.bump.outputs.rc_version }}
            rc_tag: ${{ steps.bump.outputs.rc_tag }}
        permissions:
            contents: read
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0

            - name: Get latest final tag
              id: get_latest
              run: |
                  set -euo pipefail
                  LATEST_TAG=$(git tag --sort=-v:refname | awk '/^selfhosted-[0-9]+\.[0-9]+\.[0-9]+$/{print; exit}')
                  if [ -z "${LATEST_TAG}" ]; then
                    LATEST_TAG="selfhosted-0.0.0"
                  fi
                  echo "Latest final self-hosted tag: $LATEST_TAG"
                  echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

            - name: Bump version
              id: bump
              run: |
                  set -euo pipefail
                  LATEST="${{ steps.get_latest.outputs.latest_tag }}"
                  if [[ ! "$LATEST" =~ ^selfhosted-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Invalid latest tag: $LATEST"; exit 1
                  fi
                  VERSION=${LATEST#selfhosted-}
                  IFS='.' read -r -a parts <<< "$VERSION"
                  MAJOR=${parts[0]}; MINOR=${parts[1]}; PATCH=${parts[2]}
                  TYPE="${{ github.event.inputs.version_type }}"

                  if [ "$TYPE" == "custom" ]; then
                    NEW_VERSION="${{ github.event.inputs.custom_version }}"
                    if [ -z "$NEW_VERSION" ]; then
                      echo "custom_version is required when version_type=custom"; exit 1
                    fi
                    NEW_VERSION=${NEW_VERSION#selfhosted-}
                    NEW_VERSION=${NEW_VERSION#v}
                    if [[ ! "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "Invalid custom version: $NEW_VERSION (expected MAJOR.MINOR.PATCH)"; exit 1
                    fi
                  elif [ "$TYPE" == "major" ]; then
                    MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
                    NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                  elif [ "$TYPE" == "minor" ]; then
                    MINOR=$((MINOR + 1)); PATCH=0
                    NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                  else
                    PATCH=$((PATCH + 1))
                    NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                  fi

                  RC_VERSION="${NEW_VERSION}-rc.${{ github.run_number }}"
                  RELEASE_TAG="selfhosted-${NEW_VERSION}"
                  RC_TAG="selfhosted-${RC_VERSION}"

                  echo "Final version : $NEW_VERSION"
                  echo "Final tag     : $RELEASE_TAG"
                  echo "RC version    : $RC_VERSION"
                  echo "RC tag        : $RC_TAG"

                  {
                    echo "release_version=$NEW_VERSION"
                    echo "release_tag=$RELEASE_TAG"
                    echo "rc_version=$RC_VERSION"
                    echo "rc_tag=$RC_TAG"
                  } >> $GITHUB_OUTPUT

    create-rc-tag:
        name: Create RC git tag at current SHA
        needs: plan-release
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            rc_sha: ${{ steps.tag.outputs.rc_sha }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Push RC tag
              id: tag
              env:
                  RC_TAG: ${{ needs.plan-release.outputs.rc_tag }}
              run: |
                  set -euo pipefail
                  if git ls-remote --exit-code --tags origin "refs/tags/${RC_TAG}" >/dev/null 2>&1; then
                    echo "RC tag ${RC_TAG} already exists. Reusing."
                  else
                    git config user.name "GitHub Actions"
                    git config user.email "actions@github.com"
                    git tag "${RC_TAG}"
                    git push origin "${RC_TAG}"
                  fi
                  echo "rc_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    build-and-push:
        name: Build and Push RC Docker Images
        needs:
            - plan-release
            - create-rc-tag
        runs-on: ubuntu-latest
        # No environment: production here on purpose. The gate is at PROMOTE,
        # not at build — the Friday-morning flow dispatches at 9h and lets
        # the RC build + matrix run in background DURING the weekly meeting
        # and QA day. If we kept env=production here (3 required reviewers)
        # the build would block at 9h and the paralelism collapses. The RC
        # image is pushed as `:X.Y.Z-rc.N` only (never `:latest`), so the
        # blast radius of building without approval is bounded — only the
        # promote step (which actually mints `:latest`) is gated.
        permissions:
            contents: read
            packages: write
            security-events: write
        steps:
            - name: Checkout RC tag
              uses: actions/checkout@v6.0.2
              with:
                  ref: ${{ needs.plan-release.outputs.rc_tag }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4.0.0
              with:
                  platforms: amd64,arm64

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4.0.0

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v4.1.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push RC images
              env:
                  # IMPORTANT: only the RC tag is pushed here. The final
                  # X.Y.Z tag and :latest are minted by selfhosted-promote.yml
                  # after the matrix E2E passes — never by this job.
                  RC_VERSION: ${{ needs.plan-release.outputs.rc_version }}
                  RELEASE_VERSION_FINAL: ${{ needs.plan-release.outputs.release_version }}
                  OWNER: ${{ github.repository_owner }}
                  API_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-ai-api:${{ needs.plan-release.outputs.rc_version }}
                  WEBHOOKS_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-ai-webhook:${{ needs.plan-release.outputs.rc_version }}
                  WORKER_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-ai-worker:${{ needs.plan-release.outputs.rc_version }}
                  WEB_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-ai-web:${{ needs.plan-release.outputs.rc_version }}
                  MCP_MANAGER_TAGS: ghcr.io/${{ github.repository_owner }}/kodus-mcp-manager:${{ needs.plan-release.outputs.rc_version }}
              run: |
                  set -euo pipefail
                  docker buildx bake -f docker-bake.hcl \
                    --set base.args.RELEASE_VERSION=${RELEASE_VERSION_FINAL} \
                    --set base.args.API_CLOUD_MODE=false \
                    --set base.cache-from=type=gha \
                    --set base.cache-to=type=gha,mode=max \
                    --set *.platform=linux/amd64,linux/arm64 \
                    --push

            - name: Trivy scan — kodus-ai-api
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-ai-api:${{ needs.plan-release.outputs.rc_version }}
                  format: "sarif"
                  output: "trivy-api.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-ai-webhook
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-ai-webhook:${{ needs.plan-release.outputs.rc_version }}
                  format: "sarif"
                  output: "trivy-webhook.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-ai-worker
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-ai-worker:${{ needs.plan-release.outputs.rc_version }}
                  format: "sarif"
                  output: "trivy-worker.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-ai-web
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-ai-web:${{ needs.plan-release.outputs.rc_version }}
                  format: "sarif"
                  output: "trivy-web.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Trivy scan — kodus-mcp-manager
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ghcr.io/${{ github.repository_owner }}/kodus-mcp-manager:${{ needs.plan-release.outputs.rc_version }}
                  format: "sarif"
                  output: "trivy-mcp-manager.sarif"
                  severity: "CRITICAL,HIGH"
                  ignore-unfixed: true
                  exit-code: "0"

            - name: Upload Trivy SARIF — api
              uses: github/codeql-action/upload-sarif@v4
              with: { sarif_file: trivy-api.sarif, category: trivy-selfhosted-api }
            - name: Upload Trivy SARIF — webhook
              uses: github/codeql-action/upload-sarif@v4
              with: { sarif_file: trivy-webhook.sarif, category: trivy-selfhosted-webhook }
            - name: Upload Trivy SARIF — worker
              uses: github/codeql-action/upload-sarif@v4
              with: { sarif_file: trivy-worker.sarif, category: trivy-selfhosted-worker }
            - name: Upload Trivy SARIF — web
              uses: github/codeql-action/upload-sarif@v4
              with: { sarif_file: trivy-web.sarif, category: trivy-selfhosted-web }
            - name: Upload Trivy SARIF — mcp-manager
              uses: github/codeql-action/upload-sarif@v4
              with: { sarif_file: trivy-mcp-manager.sarif, category: trivy-selfhosted-mcp-manager }

    e2e-matrix:
        name: E2E matrix (provider × license)
        needs:
            - plan-release
            - build-and-push
        permissions:
            contents: read
            packages: read
        uses: ./.github/workflows/e2e-self-hosted-matrix.yml
        with:
            image_tag: ${{ needs.plan-release.outputs.rc_tag }}
            # FULL coverage on release: adds upgrade-N-1→N, SSO,
            # Stripe billing — the lifecycle scenarios that only matter
            # when cutting a customer-visible release. e2e-cloud
            # per-merge stays on fast.yml.
            matrix_file: matrix/full.yml
        secrets: inherit

    promote:
        name: Promote RC to final
        needs:
            - plan-release
            - e2e-matrix
        permissions:
            contents: write
            packages: write
        uses: ./.github/workflows/selfhosted-promote.yml
        with:
            rc_version: ${{ needs.plan-release.outputs.rc_version }}
            release_version: ${{ needs.plan-release.outputs.release_version }}
            release_tag: ${{ needs.plan-release.outputs.release_tag }}
            # Friday flow: hotfix=false → promote pauses on `production-release`
            # env (required reviewers) until a human approves post-meeting+QA.
            # P0 dispatch: hotfix=true → promote uses unrestricted `production`
            # env and ships immediately after the matrix passes.
            hotfix: ${{ inputs.hotfix == true }}
        secrets: inherit

    cli-changes:
        name: Detect CLI changes since last release
        needs:
            - plan-release
            - promote
        if: needs.promote.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            should_release: ${{ steps.detect.outputs.should_release }}
            new_tag: ${{ steps.detect.outputs.new_tag }}
            new_version: ${{ steps.detect.outputs.new_version }}
        steps:
            - name: Checkout main (full history + tags)
              uses: actions/checkout@v6.0.2
              with:
                  ref: main
                  fetch-depth: 0
                  fetch-tags: true
                  token: ${{ secrets.RELEASE_BOT_TOKEN }}

            - name: Detect CLI changes
              id: detect
              env:
                  RELEASE_TAG: ${{ needs.plan-release.outputs.release_tag }}
              run: |
                  set -euo pipefail
                  LAST_TAG=$(git tag --sort=-v:refname | awk '/^cli-v[0-9]+\.[0-9]+\.[0-9]+$/{print; exit}')
                  if [ -z "$LAST_TAG" ]; then
                      CHANGED=1
                  else
                      CHANGED=$(git diff --name-only "$LAST_TAG" "$RELEASE_TAG" -- apps/cli/ | wc -l | xargs)
                  fi
                  CURRENT_VERSION=$(node -p "require('./apps/cli/package.json').version")
                  if [ "$CHANGED" -gt 0 ]; then
                      IFS='.' read -ra PARTS <<< "$CURRENT_VERSION"
                      NEW_VERSION="${PARTS[0]}.${PARTS[1]}.$((PARTS[2] + 1))"
                      NEW_TAG="cli-v$NEW_VERSION"
                      {
                          echo "should_release=true"
                          echo "new_version=$NEW_VERSION"
                          echo "new_tag=$NEW_TAG"
                      } >> "$GITHUB_OUTPUT"
                  else
                      echo "should_release=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Bump version, commit, push tag
              if: steps.detect.outputs.should_release == 'true'
              env:
                  NEW_VERSION: ${{ steps.detect.outputs.new_version }}
                  NEW_TAG: ${{ steps.detect.outputs.new_tag }}
              run: |
                  set -euo pipefail
                  node -e "
                      const fs = require('fs');
                      const path = './apps/cli/package.json';
                      const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
                      pkg.version = process.env.NEW_VERSION;
                      fs.writeFileSync(path, JSON.stringify(pkg, null, 4) + '\n');
                  "
                  git config user.name "kodus-release-bot"
                  git config user.email "actions@kodus.io"
                  git add apps/cli/package.json
                  git commit -m "chore(cli): bump version to $NEW_VERSION"
                  git push origin HEAD:main
                  git tag "$NEW_TAG"
                  git push origin "$NEW_TAG"

    cli-release:
        name: Publish CLI release
        needs:
            - cli-changes
        if: needs.cli-changes.outputs.should_release == 'true'
        permissions:
            contents: write
            id-token: write
        uses: ./.github/workflows/cli-release.yml
        with:
            tag: ${{ needs.cli-changes.outputs.new_tag }}
        secrets: inherit

    changelog-publish:
        name: Publish changelog (final tag)
        needs:
            - plan-release
            - promote
        if: needs.promote.result == 'success'
        permissions:
            contents: write
        uses: ./.github/workflows/changelog-publish.yml
        with:
            tag: ${{ needs.plan-release.outputs.release_tag }}
        secrets: inherit

    cleanup-rc-tag:
        name: Cleanup RC tag on success
        needs:
            - plan-release
            - promote
        if: needs.promote.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Delete RC git tag (now superseded by final tag)
              env:
                  RC_TAG: ${{ needs.plan-release.outputs.rc_tag }}
              run: |
                  set -euo pipefail
                  # Keep RC images on GHCR for auditing — only delete the git tag.
                  # Using GITHUB_TOKEN is fine here; deleting refs doesn't trip
                  # the same protection as creating them.
                  git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
                  git ls-remote --exit-code --tags origin "refs/tags/${RC_TAG}" >/dev/null 2>&1 \
                    && git push origin --delete "refs/tags/${RC_TAG}" \
                    || echo "RC tag ${RC_TAG} already gone"

    env-sync-installer:
        name: Sync .env.example to kodus-installer
        needs:
            - plan-release
            - promote
        permissions:
            contents: read
        # Gated on promote so we don't push env updates to the installer
        # for an RC that never shipped. plan-release.outputs.release_tag
        # is the final selfhosted-X.Y.Z (no -rc suffix).
        if: needs.promote.result == 'success'
        # Same cascading-events restriction as cli-release / changelog-
        # publish: the selfhosted-X.Y.Z tag pushed by GITHUB_TOKEN above
        # would not fire env-sync-release.yml's `push: tags` trigger.
        # Invoke it explicitly so .env.example + schema-vars.sh in
        # kodus-installer get regenerated for every self-hosted release.
        uses: ./.github/workflows/env-sync-release.yml
        with:
            tag: ${{ needs.plan-release.outputs.release_tag }}
        secrets: inherit

    trigger-installer-e2e:
        name: Trigger legacy self-hosted E2E in kodus-installer
        needs:
            - plan-release
            - promote
        # Fires AFTER promote (final tag exists in GHCR). This is the
        # legacy single-cell E2E in kodus-installer; the multi-provider
        # matrix that gates promote lives at e2e-self-hosted-matrix.yml
        # in this repo. Both run — the installer one is a redundant
        # post-promote sanity check against the published :latest image.
        if: needs.promote.result == 'success'
        runs-on: ubuntu-latest
        # GITHUB_TOKEN isn't used here (we dispatch with CROSS_REPO_PAT),
        # but declare an explicit empty perms block so the default
        # write-all token scope doesn't leak in.
        permissions: {}
        # GITHUB_TOKEN only scopes to this repo, so a cross-repo PAT is
        # needed to fire repository_dispatch into kodustech/kodus-installer.
        # We reuse CROSS_REPO_PAT (already used by env-sync-release.yml to
        # checkout + push + open PRs in the installer). It needs
        # `Contents: Read and write` on kodus-installer — same permission
        # env-sync already requires, so no new secret to manage.
        steps:
            - name: Fire repository_dispatch into kodus-installer
              env:
                  GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
                  RELEASE_TAG: ${{ needs.plan-release.outputs.release_tag }}
              run: |
                  if [ -z "$GH_TOKEN" ]; then
                      echo "::warning::CROSS_REPO_PAT is not set — skipping E2E dispatch."
                      exit 0
                  fi
                  gh api \
                      --method POST \
                      "repos/kodustech/kodus-installer/dispatches" \
                      -f event_type=selfhosted-image-published \
                      -f client_payload[release_tag]="$RELEASE_TAG" \
                      -f client_payload[image_tag]=latest \
                      -f client_payload[source_run_url]="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  echo "::notice::Dispatched selfhosted-image-published to kodustech/kodus-installer for tag $RELEASE_TAG"

    # ----------------------------------------------------------------
    # Always unfreeze, even if anything above failed or was cancelled.
    # Only fires if freeze-main actually succeeded (no point trying to
    # disable a freeze we never enabled — hotfix path skips both).
    # ----------------------------------------------------------------
    unfreeze-main:
        name: 🌡 Unfreeze main
        needs:
            - freeze-main
            - plan-release
            - build-and-push
            - e2e-matrix
            - promote
        if: ${{ always() && needs.freeze-main.result == 'success' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Deactivate release-freeze ruleset
              env:
                  GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
                  RULESET_ID: 17004627
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail
                  echo "Deactivating ruleset $RULESET_ID on $REPO ..."
                  CURRENT=$(gh api "repos/${REPO}/rulesets/${RULESET_ID}")
                  echo "$CURRENT" | jq '.enforcement="disabled"' > /tmp/ruleset.json
                  gh api --method PUT "repos/${REPO}/rulesets/${RULESET_ID}" --input /tmp/ruleset.json | jq '{name, enforcement}'
                  echo "::notice::main is unfrozen — PRs can merge again."

    notify-discord-failure:
        name: Notify Discord (failure only)
        needs:
            - plan-release
            - build-and-push
            - e2e-matrix
            - promote
        if: always() && (
            needs.build-and-push.result == 'failure' ||
            needs.e2e-matrix.result == 'failure' ||
            needs.promote.result == 'failure'
            )
        runs-on: ubuntu-latest
        environment: production
        permissions: {}
        steps:
            - name: Compose failure context
              id: ctx
              run: |
                  if [ "${{ needs.e2e-matrix.result }}" = "failure" ]; then
                    echo "phase=E2E matrix" >> $GITHUB_OUTPUT
                    echo "color=0xff8800" >> $GITHUB_OUTPUT
                  elif [ "${{ needs.promote.result }}" = "failure" ]; then
                    echo "phase=Promotion" >> $GITHUB_OUTPUT
                    echo "color=0xff0000" >> $GITHUB_OUTPUT
                  else
                    echo "phase=Build" >> $GITHUB_OUTPUT
                    echo "color=0xff0000" >> $GITHUB_OUTPUT
                  fi

            - name: Check Discord webhook configuration
              id: discord-webhook
              run: |
                  if [ -n "${{ secrets.DISCORD_WEBHOOK_SELFHOSTED }}" ]; then
                    echo "configured=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "configured=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Notify Discord on failure
              if: steps.discord-webhook.outputs.configured == 'true'
              uses: sarisia/actions-status-discord@v1.16.0
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_INTERNAL || secrets.DISCORD_WEBHOOK_SELFHOSTED || secrets.DISCORD_WEBHOOK }}
                  content: ":x: Self-hosted release `${{ needs.plan-release.outputs.rc_tag }}` failed at: **${{ steps.ctx.outputs.phase }}**. Customer-visible tag `${{ needs.plan-release.outputs.release_tag }}` was NOT created."
                  title: "Self-Hosted Release Failed (${{ steps.ctx.outputs.phase }})"
